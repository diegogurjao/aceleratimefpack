<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ACELERA TIME — Logística</title>
<style>
/* ===================== DESIGN SYSTEM ===================== */
:root {
  --pri:#1A3A5C; --sec:#2E75B6; --acc:#E8671A;
  --grn:#1E7A1E; --red:#C00000; --ylw:#D4860A; --pur:#6B21A8;
  --bg:#F0F4F8; --card:#FFF; --bdr:#DDE3EC;
  --txt:#1E293B; --mut:#64748B; --shd:0 2px 8px rgba(0,0,0,.09);
  --r:10px; --r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;font-size:14px}
a{text-decoration:none;color:inherit}

/* ===================== LAYOUT ===================== */
#app{min-height:100vh}
.topbar{background:var(--pri);color:#fff;height:54px;display:flex;align-items:center;
  justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 10px rgba(0,0,0,.25)}
.topbar-logo{font-size:18px;font-weight:800;letter-spacing:.5px}
.topbar-logo em{color:var(--acc);font-style:normal}
.topbar-right{display:flex;align-items:center;gap:10px}
.notif-btn{background:var(--acc);border:none;color:#fff;border-radius:50%;
  width:28px;height:28px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.user-chip{font-size:12px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}

.body-wrap{display:flex;min-height:calc(100vh - 54px)}

/* SIDEBAR */
.sidebar{width:210px;background:var(--pri);padding:10px 0 80px;flex-shrink:0;overflow-y:auto}
.nav-section{padding:4px 14px 2px;font-size:10px;font-weight:700;
  color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;color:rgba(255,255,255,.72);
  cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(46,117,182,.3);color:#fff;border-left-color:var(--acc);font-weight:600}
.nav-item .ico{font-size:15px;width:18px;text-align:center}
.nav-badge{background:var(--acc);color:#fff;border-radius:20px;font-size:10px;
  padding:1px 6px;font-weight:700;margin-left:auto}

/* MAIN */
.main{flex:1;padding:20px;overflow:auto;min-width:0}
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:14px 12px 72px}
  .user-chip{display:none}
}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--pri);
  justify-content:space-around;align-items:center;z-index:200;
  box-shadow:0 -2px 10px rgba(0,0,0,.2)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;
  color:rgba(255,255,255,.55);font-size:10px;cursor:pointer;padding:4px 8px;flex:1}
.bnav-item.active{color:var(--acc)}
.bnav-item .ico{font-size:20px}
@media(max-width:768px){.bnav{display:flex}}

/* ===================== COMPONENTS ===================== */
.page-hdr{margin-bottom:18px}
.page-hdr h1{font-size:20px;font-weight:700;color:var(--pri)}
.page-hdr p{font-size:12px;color:var(--mut);margin-top:2px}
.tag{display:inline-block;background:var(--sec);color:#fff;font-size:10px;
  padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}

/* CARDS GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shd);
  border-left:5px solid var(--bdr);display:flex;align-items:center;gap:14px;transition:transform .1s}
.stat-card:hover{transform:translateY(-1px)}
.stat-ico{font-size:26px}
.stat-num{font-size:26px;font-weight:800;line-height:1}
.stat-lbl{font-size:11px;color:var(--mut);margin-top:2px}
.sc-blue{border-left-color:var(--sec)}.sc-blue .stat-num{color:var(--sec)}
.sc-grn{border-left-color:var(--grn)}.sc-grn .stat-num{color:var(--grn)}
.sc-red{border-left-color:var(--red)}.sc-red .stat-num{color:var(--red)}
.sc-ylw{border-left-color:var(--ylw)}.sc-ylw .stat-num{color:var(--ylw)}
.sc-pur{border-left-color:var(--pur)}.sc-pur .stat-num{color:var(--pur)}

/* CARD PANEL */
.panel{background:var(--card);border-radius:var(--r);box-shadow:var(--shd);margin-bottom:18px;overflow:hidden}
.panel-hdr{padding:13px 16px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.panel-title{font-size:14px;font-weight:700;color:var(--pri);display:flex;align-items:center;gap:7px}
.panel-acts{display:flex;gap:8px;align-items:center}
.panel-body{padding:0}

/* TABLES */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse}
table.tbl th{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;
  padding:9px 13px;background:#F8FAFC;text-align:left;white-space:nowrap}
table.tbl td{padding:11px 13px;border-bottom:1px solid #F0F4F8;font-size:13px;vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr:hover td{background:#F8FAFC;cursor:pointer}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;
  padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}

/* BUTTONS */
.btn{border:none;border-radius:var(--r-sm);padding:7px 14px;font-size:13px;
  font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .12s}
.btn-pri{background:var(--sec);color:#fff}
.btn-pri:hover{background:#1a5a9a}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:hover{background:#c45510}
.btn-grn{background:var(--grn);color:#fff}
.btn-grn:hover{background:#155a15}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:#F0F4F8;color:var(--txt);border:1px solid var(--bdr)}
.btn-ghost:hover{background:#E2E8F0}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{background:none;border:none;font-size:16px;padding:4px;border-radius:4px}
.btn-icon:hover{background:#F0F4F8}

/* FORM */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:var(--r-sm);
  font-size:13px;transition:border .12s;background:#fff}
.form-control:focus{outline:none;border-color:var(--sec)}
textarea.form-control{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:560px;
  box-shadow:0 8px 40px rgba(0,0,0,.2);margin:auto;overflow:hidden}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;background:#F8FAFC}
.modal-title{font-size:15px;font-weight:700;color:var(--pri)}
.modal-close{background:none;border:none;font-size:20px;color:var(--mut);cursor:pointer;line-height:1}
.modal-body{padding:18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--bdr);display:flex;
  justify-content:flex-end;gap:10px;background:#F8FAFC}

/* TABS */
.tabs{display:flex;gap:0;background:#F0F4F8;border-radius:8px;padding:3px;
  width:fit-content;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:7px 16px;border:none;border-radius:6px;background:none;
  font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;white-space:nowrap}
.tab-btn.active{background:var(--pri);color:#fff}
.tab-btn:hover:not(.active){background:#E2E8F0;color:var(--txt)}

/* SEARCH & FILTER BAR */
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:160px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--bdr);
  border-radius:var(--r-sm);font-size:13px}
.search-box input:focus{outline:none;border-color:var(--sec)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:14px}

/* PROGRESS BAR */
.prog-bar{height:8px;background:#E2E8F0;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}

/* CHECKLIST ITEM */
.check-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;
  border-bottom:1px solid #F0F4F8}
.check-item:last-child{border-bottom:none}
.check-item.done .task-name{text-decoration:line-through;color:var(--mut)}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;margin-top:1px;transition:all .15s}
.check-circle.done{background:var(--grn);border-color:var(--grn);color:#fff}
.check-circle.late{border-color:var(--red)}
.task-info{flex:1}
.task-name{font-size:13px;font-weight:600}
.task-meta{font-size:11px;color:var(--mut);margin-top:2px}
.task-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* WEEK GRID */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.week-nav span{font-size:14px;font-weight:700;color:var(--pri);flex:1;text-align:center}
.week-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;overflow-x:auto}
@media(max-width:900px){.week-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.week-grid{grid-template-columns:repeat(2,1fr)}}
.day-col{background:var(--card);border-radius:var(--r);box-shadow:var(--shd);overflow:hidden}
.day-hdr{padding:8px 10px;background:var(--pri);color:#fff;text-align:center}
.day-hdr.today{background:var(--acc)}
.day-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.day-date{font-size:13px;font-weight:800;margin-top:1px}
.day-body{padding:8px}
.day-section-title{font-size:10px;font-weight:700;text-transform:uppercase;
  color:var(--mut);margin:6px 0 4px;letter-spacing:.5px}
.day-item{background:#F8FAFC;border-radius:6px;padding:7px 9px;margin-bottom:5px;
  cursor:pointer;transition:background .1s;border-left:3px solid var(--bdr)}
.day-item:hover{background:#EEF2F7}
.day-item .di-num{font-size:11px;font-weight:700;color:var(--pri)}
.day-item .di-name{font-size:11px;color:var(--txt);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-item .di-time{font-size:10px;color:var(--mut)}
.day-add{width:100%;background:none;border:1px dashed var(--bdr);border-radius:6px;
  padding:6px;font-size:12px;color:var(--mut);margin-top:4px;cursor:pointer}
.day-add:hover{background:#F0F4F8;border-color:var(--sec);color:var(--sec)}
.day-empty{font-size:11px;color:var(--mut);text-align:center;padding:6px 0}

/* HISTORY */
.hist-item{display:flex;gap:10px;padding:9px 16px;border-bottom:1px solid #F0F4F8;font-size:12px}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--sec);flex-shrink:0;margin-top:4px}
.hist-text{flex:1}
.hist-time{color:var(--mut);white-space:nowrap}

/* ALERT STRIP */
.alert-strip{display:flex;gap:10px;padding:11px 16px;border-bottom:1px solid #F0F4F8;
  align-items:flex-start}
.alert-strip:last-child{border-bottom:none}
.alert-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-body{flex:1}
.alert-title{font-size:13px;font-weight:600}
.alert-sub{font-size:11px;color:var(--mut);margin-top:2px}
.alert-time{font-size:11px;color:var(--mut);white-space:nowrap}

/* DETAIL SECTION */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:14px}
@media(max-width:500px){.detail-grid{grid-template-columns:1fr}}
.detail-lbl{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.3px}
.detail-val{font-size:13px;font-weight:600;margin-top:2px}

/* STATUS SELECTOR */
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.status-opt{padding:10px 8px;border-radius:8px;border:2px solid var(--bdr);cursor:pointer;
  text-align:center;transition:all .12s;font-size:12px;font-weight:600}
.status-opt:hover{border-color:var(--sec)}
.status-opt.selected{border-color:var(--pri);background:#EFF6FF}

/* TOAST */
.toast-container{position:fixed;top:62px;right:16px;z-index:1000;
  display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1E293B;color:#fff;padding:11px 16px;border-radius:8px;
  font-size:13px;font-weight:500;pointer-events:all;
  box-shadow:0 4px 20px rgba(0,0,0,.3);min-width:220px;max-width:340px;
  animation:slideIn .2s ease;display:flex;align-items:center;gap:10px}
.toast.toast-grn{background:var(--grn)}
.toast.toast-red{background:var(--red)}
.toast.toast-ylw{background:#B45309}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
@keyframes fadeOut{to{transform:translateX(110%);opacity:0}}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--pri);padding:20px}
.login-box{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;
  box-shadow:0 12px 50px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:28px;font-weight:900;color:var(--pri);letter-spacing:1px}
.login-logo h1 em{color:var(--acc);font-style:normal}
.login-logo p{font-size:13px;color:var(--mut);margin-top:4px}
.login-btn{width:100%;padding:13px;background:var(--pri);color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.login-btn:hover{background:var(--sec)}
.login-demo{margin-top:18px;padding:14px;background:#F8FAFC;border-radius:8px;
  font-size:12px;color:var(--mut)}
.login-demo b{display:block;color:var(--txt);margin-bottom:4px}
.login-demo-link{color:var(--sec);cursor:pointer;font-weight:600}

/* EMPTY STATE */
.empty-state{text-align:center;padding:50px 20px;color:var(--mut)}
.empty-state .es-ico{font-size:42px;margin-bottom:10px}
.empty-state p{font-size:14px}

/* DIVIDER */
.divider{height:1px;background:var(--bdr);margin:16px 0}

/* TWO COL LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* CHIP */
.chip{display:inline-block;background:#EFF6FF;color:var(--sec);padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:600}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#F0F4F8}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* ===================== KANBAN ===================== */
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;align-items:flex-start}
.kanban-board::-webkit-scrollbar{height:6px}
.kanban-col{min-width:230px;max-width:230px;flex-shrink:0;border-radius:10px;overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.09)}
.kanban-col-hdr{padding:11px 14px;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:space-between;letter-spacing:.2px}
.kanban-col-body{background:#F0F4F8;padding:8px;min-height:140px;
  display:flex;flex-direction:column;gap:8px}
.kanban-count{background:rgba(255,255,255,.28);border-radius:20px;
  padding:1px 9px;font-size:11px;font-weight:700}
.kanban-card{background:#fff;border-radius:8px;padding:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;
  transition:transform .12s,box-shadow .12s;border-left:3px solid var(--bdr);
  position:relative}
.kanban-card:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.13)}
.kanban-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.kanban-card-num{font-size:13px;font-weight:800;color:var(--pri)}
.kanban-card-date{font-size:10px;color:var(--mut)}
.kanban-card-name{font-size:12px;color:var(--txt);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.kanban-card-produto{font-size:11px;font-weight:700;color:var(--acc);margin-top:4px}
.kanban-card-esp{font-size:10px;color:var(--mut);font-weight:400}
.kanban-card-footer{margin-top:8px;padding-top:8px;border-top:1px solid #F0F4F8;
  display:flex;align-items:center;justify-content:space-between;gap:6px}
.kanban-card-resp{font-size:11px;color:var(--mut);display:flex;align-items:center;gap:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kanban-card-rota{font-size:10px;color:var(--mut);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kanban-add-btn{width:100%;background:rgba(0,0,0,.04);border:1px dashed rgba(0,0,0,.18);
  border-radius:7px;padding:7px;font-size:12px;color:var(--mut);cursor:pointer;
  margin-top:4px;transition:all .12s}
.kanban-add-btn:hover{background:#fff;border-color:var(--sec);color:var(--sec)}
.kanban-tipo-badge{font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;padding:2px 6px;border-radius:20px;color:#fff;line-height:1.6}
@media(max-width:600px){.kanban-col{min-width:190px;max-width:190px}}

/* FIELD VALIDATION */
.field-error{border-color:var(--red)!important;background:#FFF5F5!important;box-shadow:0 0 0 2px rgba(192,0,0,.12)!important}
.field-error-msg{font-size:11px;color:var(--red);margin-top:4px;font-weight:600;display:flex;align-items:center;gap:3px}

/* OPERAÇÃO DO DIA LIST */
.op-panel-hdr{padding:15px 18px;background:linear-gradient(135deg,var(--pri) 0%,#2260A0 100%);
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.op-panel-title{font-size:16px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px}
.op-panel-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}
.op-list-header{display:grid;grid-template-columns:48px 155px 1fr 1.5fr 75px 120px;
  gap:8px;padding:8px 16px;background:#F0F4F8;border-bottom:2px solid var(--bdr);
  font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.op-row{display:grid;grid-template-columns:48px 155px 1fr 1.5fr 75px 120px;
  gap:8px;align-items:center;padding:11px 16px;border-bottom:1px solid #F0F4F8;
  cursor:pointer;transition:background .12s;border-left:4px solid var(--bdr)}
.op-row:hover{background:#F8FAFC}
.op-row:last-child{border-bottom:none}
.op-badge-tipo{font-size:10px;font-weight:700;color:#fff;padding:2px 7px;border-radius:20px;
  white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.op-num{font-size:13px;font-weight:800;color:var(--pri)}
.op-name{font-size:11px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-produto-val{font-size:12px;font-weight:700;color:var(--acc)}
.op-esp-val{font-size:10px;color:var(--mut)}
.op-rota-val{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-hora-val{font-size:12px;color:var(--mut);white-space:nowrap}
@media(max-width:900px){
  .op-list-header{grid-template-columns:48px 140px 1fr 70px 110px}
  .op-row{grid-template-columns:48px 140px 1fr 70px 110px}

/* ============================================================
   UTILITIES
   ============================================================ */
function uid(){return 'id-'+Date.now()+'-'+Math.random().toString(36).slice(2,7)}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function pad(n){return n<10?'0'+n:n}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return d+'/'+m+'/'+y}
function fmtDateTime(){const n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes())}
function nowStr(){return todayStr()+' '+fmtDateTime()}

function getWeekDays(date, offset=0){
  const d = new Date(date);
  d.setDate(d.getDate() + offset*7);
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day===0?6:day-1));
  const days=[];
  for(let i=0;i<6;i++){
    const dd=new Date(mon);
    dd.setDate(mon.getDate()+i);
    days.push(dd.getFullYear()+'-'+pad(dd.getMonth()+1)+'-'+pad(dd.getDate()));
  }
  return days;
}

function weekLabel(offset){
  const days = getWeekDays(new Date(), offset);
  const s = days[0].split('-'), e = days[5].split('-');
  return s[2]+'/'+s[1]+' – '+e[2]+'/'+e[1]+'/'+e[0];
}

function badge(statusObj, statusKey){
  const s = statusObj[statusKey];
  if(!s) return '<span class="badge" style="background:#EEE;color:#666">'+statusKey+'</span>';
  return `<span class="badge" style="background:${s.bg};color:${s.color}">${s.ico} ${s.label}</span>`;
}

function dayLabel(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const isToday = dateStr===todayStr();
  return {name:DAYS_PT[d.getDay()],date:d.getDate()+'/'+(d.getMonth()+1), isToday};
}

function toast(msg, type=''){
  const div=document.createElement('div');
  div.className='toast'+(type?' toast-'+type:'');
  div.innerHTML=`<span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(div);
  setTimeout(()=>{div.style.animation='fadeOut .3s ease forwards';setTimeout(()=>div.remove(),300)},2800);
}

function doLogin(){
  const email = (document.getElementById('loginEmail').value||'').trim().toLowerCase();
  const pwd   = (document.getElementById('loginPwd').value||'');
  if(!email){ toast('⚠️ Informe o e-mail','ylw'); return; }
  // Ensure users array exists
  if(!STATE.users||!STATE.users.length){
    STATE.users=[
      {id:'u1',name:'Roberto Lima', email:'roberto@aceleratime.com',roleKey:'supervisor',setor:'Logística',senha:'123456',ativo:true},
      {id:'u2',name:'Carlos Silva', email:'carlos@aceleratime.com', roleKey:'gerente',   setor:'Geral',    senha:'123456',ativo:true},
      {id:'u3',name:'Admin Sistema',email:'admin@aceleratime.com',  roleKey:'admin',     setor:'TI',       senha:'admin', ativo:true},
    ];
  }
  const u = STATE.users.find(x=>x.email.toLowerCase()===email && x.ativo!==false);
  if(!u){ toast('❌ Usuário não encontrado ou inativo','red'); return; }
  // Password: if set to something other than '123456', require exact match
  if(u.senha && u.senha!=='123456' && pwd!==u.senha){
    toast('❌ Senha incorreta','red'); return;
  }
  const role = ROLES[u.roleKey]||ROLES.operador;
  STATE.user = {id:u.id, name:u.name, email:u.email, role:role.label, roleKey:u.roleKey, setor:u.setor};
  saveState();
  runAgentes();
  renderApp();
  navigate('dashboard');
}

function renderDashboard(){
  const today = todayStr();
  const embBase = getFilteredEmbarques();
  const colBase = getFilteredColetas();
  const embs = embBase.filter(e=>e.data===today);
  const cols = colBase.filter(c=>c.data===today);
  const atHoje = STATE.atividades.filter(a=>a.data===today||a.prazo===today);
  const emb_bl = embBase.filter(e=>e.status==='bloqueado').length;
  const rotDay = getRotinasDia(today);
  const done = Object.values(rotDay).filter(r=>r.status==='concluida').length;
  const total = ROTINA_TEMPLATES.filter(r=>r.tipo==='diaria').length;

  const alertas = [];
  embBase.filter(e=>e.status==='bloqueado').forEach(e=>{
    alertas.push({ico:'🔴',title:`Embarque ${e.numero} bloqueado`,sub:`${e.unidade?e.unidade+' · ':''}Cliente: ${e.cliente} — ${e.observacoes||'Verificar motivo'}`,time:'!'});
  });
  if(done<total && new Date().getHours()>=10){
    alertas.push({ico:'⏰',title:`${total-done} rotinas não concluídas`,sub:'Conferir checklist de rotinas do dia',time:'Hoje'});
  }
  cols.filter(c=>c.status==='em_coleta').forEach(c=>{
    alertas.push({ico:'🔄',title:`Coleta ${c.numero} em andamento`,sub:`Fornecedor: ${c.fornecedor} — Prev. ${c.horario_previsto}`,time:c.horario_previsto});

  // Merge and sort all operations by time
  const allOps=[
    ...embs.map(e=>({tipo:'emb',obj:e,hora:e.horario||'00:00'})),
    ...cols.map(c=>({tipo:'col',obj:c,hora:c.horario_previsto||'00:00'}))

  const opListHTML = allOps.length===0

/* ============================================================

function renderProgramacao(){
  const offset = STATE.weekOffset||0;
  const week = getWeekDays(new Date(), offset);
  const today = todayStr();

  return `
  <div class="page-hdr">
    <h1>📅 Programação Semanal</h1>
    <p>Embarques e coletas programados por dia</p>
  </div>

  <div class="week-nav">
    <button class="btn btn-ghost btn-sm" onclick="changeWeek(-1)">◀ Anterior</button>
    <span>${weekLabel(offset)}</span>
    <button class="btn btn-ghost btn-sm" onclick="changeWeek(1)">Próxima ▶</button>
    ${offset!==0?`<button class="btn btn-acc btn-sm" onclick="changeWeek(0,true)">Hoje</button>`:''}
  </div>

  <div class="week-grid" id="weekGrid">
    ${week.map((d,di)=>{
      const dl = dayLabel(d);
      const prog = STATE.programacao[d]||{embarques_ids:[],coletas_ids:[]};
      const embs = (prog.embarques_ids||[]).map(id=>STATE.embarques.find(e=>e.id===id)).filter(Boolean);
      const cols = (prog.coletas_ids||[]).map(id=>STATE.coletas.find(c=>c.id===id)).filter(Boolean);
      const isToday = d===today;
      return `
      <div class="day-col">
        <div class="day-hdr ${isToday?'today':''}">

            <div class="di-time">⏰ ${e.horario}</div>
          </div>`).join('')}

          <div class="day-section-title" style="margin-top:10px">🔄 Coletas (${cols.length})</div>

          <div class="day-item" style="border-left-color:${STATUS_COL[c.status]?.color||'#bbb'}" onclick="openDetalheColeta('${c.id}')">
            <div class="di-num">${c.numero} ${STATUS_COL[c.status]?.ico||''}</div>
            <div class="di-name">${c.fornecedor}</div>
            ${c.produto?`<div class="di-time" style="color:var(--acc);font-weight:600">📦 ${c.produto}</div>`:''}
            ${c.destino?`<div class="di-time">→ ${c.destino}</div>`:''}

        </div>
      </div>`;
    }).join('')}
  </div>

  <div style="margin-top:16px;display:flex;gap:14px;flex-wrap:wrap;align-items:center">
    <div style="font-size:12px;color:var(--mut);font-weight:600">Legenda:</div>
    ${Object.entries(STATUS_EMB).map(([k,v])=>`<span class="badge" style="background:${v.bg};color:${v.color}">${v.ico} ${v.label}</span>`).join('')}
  </div>`;
}

function changeWeek(dir, reset=false){
  if(reset) STATE.weekOffset=0;
  else STATE.weekOffset=(STATE.weekOffset||0)+dir;
  saveState();
  navigate('programacao');
}

/* ============================================================
   EMBARQUES
   ============================================================ */
let _embFilter = 'todos';
let _embSearch = '';
let _embMotoristaFilter = 'todos';
let _embTipoFilter = 'todos';

function renderEmbarques(){
  let list = [...getFilteredEmbarques()];
  if(_embFilter!=='todos') list=list.filter(e=>e.status===_embFilter);
  if(_embMotoristaFilter!=='todos') list=list.filter(e=>e.motorista===_embMotoristaFilter);
  if(_embTipoFilter!=='todos') list=list.filter(e=>e.tipo_caminhao===_embTipoFilter);
  if(_embSearch) list=list.filter(e=>(e.numero+e.cliente+e.destino+e.transportadora+(e.unidade||'')+(e.motorista||'')+(e.placa||'')).toLowerCase().includes(_embSearch.toLowerCase()));
  list.sort((a,b)=>b.data.localeCompare(a.data)||b.numero.localeCompare(a.numero));

  const baseForCount = getFilteredEmbarques();
  const counts = {};
  Object.keys(STATUS_EMB).forEach(k=>counts[k]=baseForCount.filter(e=>e.status===k).length);

  return `
  <div class="page-hdr">
    <h1>📦 Embarques</h1>
    <p>Gestão completa de embarques e entregas</p>
  </div>

  ${_filterUnidade!=='todas'?`<div style="background:#EDE7F6;border:1px solid #C4B5FD;border-radius:8px;padding:8px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#6B21A8;font-weight:600">🏢 Filtro: <b>${_filterUnidade}</b><button onclick="setGlobalUnidade('todas')" style="margin-left:auto;background:none;border:1px solid #A78BFA;border-radius:5px;color:#6B21A8;font-size:11px;padding:2px 8px;cursor:pointer">✕ Limpar</button></div>`:''}

  <div class="tabs">
    <button class="tab-btn ${_embFilter==='todos'?'active':''}" onclick="setEmbFilter('todos')">Todos (${baseForCount.length})</button>
    ${Object.entries(STATUS_EMB).map(([k,v])=>`
    <button class="tab-btn ${_embFilter===k?'active':''}" onclick="setEmbFilter('${k}')">${v.ico} ${v.label} (${counts[k]||0})</button>`).join('')}
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span class="search-ico">🔍</span>
      <input placeholder="Buscar por nº, cliente, destino, motorista, placa..." oninput="searchEmb(this.value)" value="${_embSearch}">
    </div>
    <select class="form-control" style="width:auto;min-width:150px;font-size:12px" onchange="setEmbMotoristaFilter(this.value)">
      <option value="todos" ${_embMotoristaFilter==='todos'?'selected':''}>👤 Todos motoristas</option>
      ${[...new Set(getFilteredEmbarques().map(e=>e.motorista).filter(Boolean))].sort().map(m=>`<option value="${m}" ${_embMotoristaFilter===m?'selected':''}>${m}</option>`).join('')}
    </select>
    <select class="form-control" style="width:auto;min-width:140px;font-size:12px" onchange="setEmbTipoFilter(this.value)">
      <option value="todos" ${_embTipoFilter==='todos'?'selected':''}>🚛 Todos tipos</option>
      <option value="Da Casa" ${_embTipoFilter==='Da Casa'?'selected':''}>🏠 Da Casa</option>
      <option value="Terceirizado" ${_embTipoFilter==='Terceirizado'?'selected':''}>🤝 Terceirizado</option>
    </select>
    <button class="btn btn-pri" onclick="openNovoEmbarque()">+ Novo Embarque</button>
  </div>

  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-title">📦 ${list.length} embarque(s) encontrado(s)</div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>Nº Pedido</th><th>Unidade</th><th>Cliente</th><th>Produto</th><th>Destino</th><th>Status</th>
            <th>Motorista</th><th>Placa</th><th>Tipo</th><th>Data</th><th>Ações</th>
          </tr>
        </thead>
        <tbody>
          ${list.length===0?`<tr><td colspan="11" style="text-align:center;padding:30px;color:var(--mut)">Nenhum embarque encontrado</td></tr>`:''}
          ${list.map(e=>`
          <tr onclick="openDetalheEmbarque('${e.id}')">
            <td><b>${e.numero}</b></td>
            <td><span class="chip" style="background:#EDE7F6;color:#6B21A8;font-size:10px">${e.unidade||'—'}</span></td>
            <td style="max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.cliente}</td>
            <td style="max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--acc);font-weight:600">${e.produto||'—'}</td>
            <td style="max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.destino}</td>
            <td>${badge(STATUS_EMB,e.status)}</td>
            <td style="white-space:nowrap">👤 ${e.motorista||'—'}</td>
            <td style="font-family:monospace;font-weight:700;font-size:12px">${e.placa||'—'}</td>
            <td style="white-space:nowrap;font-size:11px">${e.tipo_caminhao==='Da Casa'?'🏠 Casa':e.tipo_caminhao==='Terceirizado'?'🤝 Terc.':'—'}</td>
            <td style="white-space:nowrap">${fmtDate(e.data)}</td>
            <td onclick="event.stopPropagation()">
              <div style="display:flex;gap:4px;flex-wrap:wrap">
                <button class="btn btn-ghost btn-xs" onclick="openAtualizarStatusEmb('${e.id}')">Status</button>
                ${e.status==='bloqueado'?`<button class="btn btn-grn btn-xs" onclick="liberarEmbarque('${e.id}')">Liberar</button>`:''}
                ${canDo('delete')?`<button class="btn btn-xs" style="background:#FEE2E2;color:#B91C1C;border:1px solid #FECACA" title="Excluir embarque" onclick="confirmarExcluirEmb('${e.id}')">🗑️</button>`:''}
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function setEmbMotoristaFilter(v){_embMotoristaFilter=v;navigate('embarques')}

/* ============================================================
   ROTINAS DIÁRIAS
   ============================================================ */
let _rotDate = todayStr();

function getRotinasDia(date){
  if(!STATE.rotinas_dia[date]) STATE.rotinas_dia[date]={};
  return STATE.rotinas_dia[date];
}

function renderRotinas(){
  const rotDay = getRotinasDia(_rotDate);
  const allRotinas = [...ROTINA_TEMPLATES, ...(STATE.rotinas_custom||[])];
  const todayRotinas = allRotinas.filter(r=>{
    if(r.tipo==='diaria') return true;
    if(r.tipo==='semanal'){
      const d=new Date(_rotDate+'T12:00:00');
      return d.getDay()===Number(r.diaSemana);
    }
    return false;
  });

  const done = todayRotinas.filter(r=>(rotDay[r.id]||{}).status==='concluida').length;
  const late = todayRotinas.filter(r=>{
    const inst=rotDay[r.id]||{status:'nao_iniciada'};
    if(inst.status==='concluida') return false;
    const now=new Date();
    const [h,m]=r.horario.split(':').map(Number);
    return now.getHours()>h||(now.getHours()===h&&now.getMinutes()>m+10);
  }).length;
  const pct=todayRotinas.length?Math.round(done/todayRotinas.length*100):0;

  return `
  <div class="page-hdr">
    <h1>✅ Rotinas Diárias</h1>
    <p>Checklist de atividades padrão do setor de Logística</p>
  </div>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <label style="font-size:12px;font-weight:700;color:var(--mut)">DATA:</label>
    <input type="date" class="form-control" style="width:160px" value="${_rotDate}" onchange="changeRotDate(this.value)">
    ${_rotDate!==todayStr()?`<button class="btn btn-acc btn-sm" onclick="changeRotDate('${todayStr()}')">Hoje</button>`:''}
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      ${late>0?`<span class="badge" style="background:var(--red);color:#fff">⚠ ${late} atrasada(s)</span>`:''}
      <span class="badge" style="background:${pct===100?'var(--grn)':'#E0F2FE'};color:${pct===100?'#fff':'var(--sec)'}">
        ✅ ${done}/${todayRotinas.length} — ${pct}%
      </span>
    </div>
  </div>

  <div style="margin-bottom:14px">
    <div class="prog-bar" style="height:12px">
      <div class="prog-fill" style="width:${pct}%;background:${pct===100?'var(--grn)':pct>60?'var(--sec)':'var(--ylw)'}"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-title">📋 Rotinas Diárias (${todayRotinas.filter(r=>r.tipo==='diaria').length})</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-grn btn-sm" onclick="concluirTodasRotinas('${_rotDate}')">✅ Concluir todas</button>
        ${canDo('create')?`<button class="btn btn-pri btn-sm" onclick="openNovaRotina()">➕ Nova Rotina</button>`:''}
      </div>
    </div>
    ${todayRotinas.filter(r=>r.tipo==='diaria').map(r=>renderRotinaItem(r, rotDay, false)).join('')}
  </div>

  ${todayRotinas.some(r=>r.tipo==='semanal')?`
  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-title">📅 Rotinas Semanais</div>
    </div>
    ${todayRotinas.filter(r=>r.tipo==='semanal').map(r=>renderRotinaItem(r, rotDay, false)).join('')}
  </div>`:''}

  ${(STATE.rotinas_custom||[]).length>0?`
  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-title">⭐ Rotinas Personalizadas</div>
      ${canDo('create')?`<button class="btn btn-pri btn-sm" onclick="openNovaRotina()">➕ Nova</button>`:''}
    </div>
    ${(STATE.rotinas_custom||[]).map(r=>renderRotinaItem(r, rotDay, true)).join('')}
  </div>`:`
  <div style="text-align:center;padding:18px;color:var(--mut);font-size:13px">
    ${canDo('create')?`<button class="btn btn-pri btn-sm" onclick="openNovaRotina()">➕ Criar Rotina Personalizada</button>`:''}
  </div>`}

  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-title">📊 Histórico da Semana</div>
    </div>
    ${renderRotinaHistoricoSemana()}
  </div>`;
}

function renderRotinaItem(r, rotDay, isCustom){
  const inst = rotDay[r.id]||{status:'nao_iniciada', obs:''};
  const s = STATUS_AT[inst.status];
  const done = inst.status==='concluida';
  const now=new Date();
  const [h,m]=r.horario.split(':').map(Number);
  const isLate = !done && (now.getHours()>h||(now.getHours()===h&&now.getMinutes()>m+10));

  return `
  <div class="check-item" id="rot-${r.id}">
    <div class="check-circle ${done?'done':isLate?'late':''}" onclick="toggleRotina('${r.id}','${_rotDate}')">
      ${done?'✓':isLate?'!':''}
    </div>
    <div class="task-info">
      <div class="task-name" style="${done?'text-decoration:line-through;color:var(--mut)':isLate?'color:var(--red)':''}">${r.titulo}</div>
      <div class="task-meta">
        ⏰ ${r.horario}
        · 👤 ${r.resp}
        ${isLate&&!done?'· <b style="color:var(--red)">ATRASADO</b>':''}
        ${inst.updatedAt?`· Atualizado às ${inst.updatedAt}`:''}
      </div>
      ${inst.obs?`<div style="font-size:11px;color:var(--sec);margin-top:3px;background:#EFF6FF;padding:3px 7px;border-radius:4px">💬 ${inst.obs}</div>`:''}
    </div>
    <div class="task-right">
      ${badge(STATUS_AT, inst.status)}
      <button class="btn-icon" title="Editar" onclick="openEditRotina('${r.id}','${_rotDate}')">✏️</button>
      ${canDo('delete')&&inst.status!=='nao_iniciada'?`<button class="btn-icon" title="Resetar status" onclick="resetarRotina('${r.id}','${_rotDate}')" style="font-size:13px;color:var(--ylw)">↺</button>`:''}
      ${isCustom&&canDo('delete')?`<button class="btn-icon" title="Excluir rotina" onclick="excluirRotinaCustom('${r.id}')" style="font-size:13px;color:var(--red)">🗑️</button>`:''}
    </div>
  </div>`;
}

function renderRotinaHistoricoSemana(){
  const week = getWeekDays(new Date(), STATE.weekOffset||0);
  const today = todayStr();
  return `
  <div class="tbl-wrap">
    <table class="tbl">
      <thead><tr>
        <th>Rotina</th>
        ${week.map(d=>`<th style="text-align:center">${dayLabel(d).name}<br><span style="font-size:10px">${dayLabel(d).date}</span></th>`).join('')}
      </tr></thead>
      <tbody>
        ${ROTINA_TEMPLATES.filter(r=>r.tipo==='diaria').map(r=>`
        <tr>
          <td style="font-size:12px;max-width:180px">${r.titulo.substring(0,40)}${r.titulo.length>40?'…':''}</td>
          ${week.map(d=>{
            const inst=(STATE.rotinas_dia[d]||{})[r.id]||{status:'nao_iniciada'};
            if(d>today) return `<td style="text-align:center;color:var(--mut)">—</td>`;
            return `<td style="text-align:center">${STATUS_AT[inst.status]?.ico||'⬜'}</td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function changeRotDate(d){_rotDate=d;navigate('rotinas')}

function toggleRotina(rid, date){
  if(!STATE.rotinas_dia[date]) STATE.rotinas_dia[date]={};
  const curr = (STATE.rotinas_dia[date][rid]||{}).status||'nao_iniciada';
  const next = curr==='concluida'?'nao_iniciada':'concluida';
  STATE.rotinas_dia[date][rid]={status:next, obs:(STATE.rotinas_dia[date][rid]||{}).obs||'', updatedAt:fmtDateTime()};
  saveState();
  navigate('rotinas');
  toast(next==='concluida'?'✅ Rotina concluída!':'↩️ Rotina reaberta', next==='concluida'?'grn':'');
}

function concluirTodasRotinas(date){
  if(!STATE.rotinas_dia[date]) STATE.rotinas_dia[date]={};
  ROTINA_TEMPLATES.forEach(r=>{
    STATE.rotinas_dia[date][r.id]={status:'concluida',obs:(STATE.rotinas_dia[date][r.id]||{}).obs||'',updatedAt:fmtDateTime()};
  });
  saveState();
  navigate('rotinas');
  toast('✅ Todas as rotinas concluídas!','grn');
}

function openEditRotina(rid, date){
  const tpl = ROTINA_TEMPLATES.find(r=>r.id===rid);
  const inst = (STATE.rotinas_dia[date]||{})[rid]||{status:'nao_iniciada',obs:''};
  const statusOpts = Object.entries(STATUS_AT).map(([k,v])=>`
    <div class="status-opt ${inst.status===k?'selected':''}" onclick="selectRotinaStatus('${rid}','${k}')" id="rs-${rid}-${k}">
      ${v.ico} ${v.label}
    </div>`).join('');

  openModal(`✏️ ${tpl.titulo}`,`
    <div class="form-group">
      <label>Status</label>
      <div class="status-grid" id="rotinaStatusGrid">${statusOpts}</div>
      <input type="hidden" id="rotinaStatusVal" value="${inst.status}">
    </div>
    <div class="form-group">
      <label>Observação</label>
      <textarea class="form-control" id="rotinaObs" placeholder="Observação opcional...">${inst.obs||''}</textarea>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-pri" onclick="saveRotinaEdit('${rid}','${date}')">Salvar</button>`
  );
}

function selectRotinaStatus(rid, status){
  document.querySelectorAll('[id^="rs-'+rid+'-"]').forEach(el=>el.classList.remove('selected'));
  document.getElementById('rs-'+rid+'-'+status).classList.add('selected');
  document.getElementById('rotinaStatusVal').value=status;
}

function saveRotinaEdit(rid, date){
  if(!STATE.rotinas_dia[date]) STATE.rotinas_dia[date]={};
  STATE.rotinas_dia[date][rid]={
    status: document.getElementById('rotinaStatusVal').value,
    obs: document.getElementById('rotinaObs').value,
    updatedAt: fmtDateTime()
  };
  saveState();
  closeModal();
  navigate('rotinas');
  toast('✅ Rotina atualizada!','grn');
}

function renderAtividades(){

  list.sort((a,b)=>b.data.localeCompare(a.data));

  </div>

  <!-- FILTRO DE RESPONSÁVEL -->
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
    <span style="font-size:11px;font-weight:700;color:var(--mut);white-space:nowrap">RESPONSÁVEL:</span>
    <button class="tab-btn ${_atFilterResp==='todos'?'active':''}" onclick="setAtFilterResp('todos')" style="padding:5px 12px;font-size:12px">Todos</button>
    ${respsUnicos.map(r=>`<button class="tab-btn ${_atFilterResp===r?'active':''}" onclick="setAtFilterResp('${r.replace(/'/g,"\\'")}') " style="padding:5px 12px;font-size:12px">👤 ${r} (${STATE.atividades.filter(a=>a.responsavel===r).length})</button>`).join('')}
  </div>

  <div class="tabs">
    <button class="tab-btn ${_atFilter==='todos'?'active':''}" onclick="setAtFilter('todos')">Todas (${baseAt.length})</button>
    ${Object.entries(STATUS_AT).map(([k,v])=>counts[k]?`
    <button class="tab-btn ${_atFilter===k?'active':''}" onclick="setAtFilter('${k}')">${v.ico} ${v.label} (${counts[k]})</button>`:''
    ).join('')}
  </div>

  <div class="toolbar">
    <button class="btn btn-pri" onclick="openNovaAtividade()">+ Nova Atividade</button>
    ${(_atFilterSetor!=='todos'||_atFilterResp!=='todos')?`<button class="btn btn-ghost btn-sm" onclick="clearAtFilters()">✕ Limpar filtros</button>`:''}
  </div>

  <div class="panel">
    <div class="panel-hdr"><div class="panel-title">📋 ${list.length} atividade(s)</div></div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Título</th><th>Setor</th><th>Resp.</th><th>Status</th><th>Prazo</th><th>Novo Prazo</th><th>Custo</th><th>Tipo</th><th>Ações</th></tr></thead>
        <tbody>
          ${list.length===0?`<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--mut)">Nenhuma atividade</td></tr>`:''}
          ${list.map(a=>`
          <tr onclick="openDetalheAtividade('${a.id}')">

            <td><span class="chip">${a.setor||'—'}</span></td>
            <td>${a.responsavel}</td>
            <td>${badge(STATUS_AT,a.status)}</td>
            <td>${fmtDate(a.prazo)}</td>
            <td style="color:${a.novo_prazo?'var(--acc)':'var(--mut)'}">${a.novo_prazo?fmtDate(a.novo_prazo):'—'}</td>
            <td style="font-weight:600;color:var(--grn)">${a.custo!=null&&a.custo!==''?'R$ '+Number(a.custo).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—'}</td>
            <td><span class="chip" style="background:#F0F4F8;color:var(--txt)">${a.tipo}</span></td>

function openNovaRotina(){
  openModal('➕ Nova Rotina Personalizada',
    `<div class="form-group"><label>Título da Rotina *</label>
      <input class="form-control" id="nr-titulo" placeholder="Ex: Verificar temperatura do armazém"></div>
    <div class="form-row">
      <div class="form-group"><label>Horário *</label>
        <input class="form-control" id="nr-horario" type="time" value="08:00"></div>
      <div class="form-group"><label>Responsável</label>
        <input class="form-control" id="nr-resp" placeholder="Ex: Operador"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Tipo</label>
        <select class="form-control" id="nr-tipo">
          <option value="diaria">🔁 Diária</option>
          <option value="semanal">📅 Semanal</option>
        </select></div>
      <div class="form-group" id="nr-diasemana-grp" style="display:none"><label>Dia da Semana</label>
        <select class="form-control" id="nr-diasemana">
          <option value="1">Segunda-feira</option><option value="2">Terça-feira</option>
          <option value="3">Quarta-feira</option><option value="4">Quinta-feira</option>
          <option value="5">Sexta-feira</option><option value="6">Sábado</option>
        </select></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-pri" onclick="salvarNovaRotina()">💾 Criar Rotina</button>`);
  setTimeout(()=>{
    const t = document.getElementById('nr-tipo');
    if(t) t.onchange=function(){
      const d=document.getElementById('nr-diasemana-grp');
      if(d) d.style.display=this.value==='semanal'?'block':'none';
    };
  },100);
}

function salvarNovaRotina(){
  const titulo = (document.getElementById('nr-titulo')?.value||'').trim();
  const horario = document.getElementById('nr-horario')?.value||'08:00';
  const resp    = document.getElementById('nr-resp')?.value||'Operador';
  const tipo    = document.getElementById('nr-tipo')?.value||'diaria';
  const diaSemana = parseInt(document.getElementById('nr-diasemana')?.value||'1');
  if(!titulo){ toast('⚠️ Informe o título da rotina','ylw'); return; }
  if(!STATE.rotinas_custom) STATE.rotinas_custom=[];
  const newId = 'rc-'+Date.now();
  STATE.rotinas_custom.push({id:newId, titulo, horario, resp, tipo, ...(tipo==='semanal'?{diaSemana}:{}), custom:true});
  saveState();
  closeModal();
  navigate('rotinas');
  toast('✅ Rotina criada com sucesso!','grn');
}

function excluirRotinaCustom(id){
  if(!canDo('delete')){ toast('🔒 Sem permissão','red'); return; }
  const r = (STATE.rotinas_custom||[]).find(x=>x.id===id);
  if(!r) return;
  openModal('🗑️ Excluir Rotina',
    `<div style="text-align:center;padding:10px 0 16px">
      <div style="font-size:36px;margin-bottom:8px">⚠️</div>
      <div style="font-size:14px;font-weight:700">${r.titulo}</div>
      <div style="color:var(--mut);font-size:12px;margin-top:4px">Esta rotina personalizada será excluída permanentemente.</div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-red" onclick="confirmarExcluirRotinaCustom('${id}')">🗑️ Excluir</button>`);
}

function confirmarExcluirRotinaCustom(id){
  STATE.rotinas_custom = (STATE.rotinas_custom||[]).filter(x=>x.id!==id);
  // Also remove from rotinas_dia entries if any
  Object.values(STATE.rotinas_dia||{}).forEach(day=>{delete day[id];});
  saveState();
  closeModal();
  navigate('rotinas');
  toast('🗑️ Rotina excluída','');
}

function saveNovoEmbarque(){
  if(!validateFields([
    {id:'ef-numero',label:'Número do Pedido'},
    {id:'ef-data',label:'Data'},
    {id:'ef-unidade',label:'Unidade'},
    {id:'ef-cliente',label:'Cliente'},
    {id:'ef-destino',label:'Destino'},
    {id:'ef-produto',label:'Produto'},
    {id:'ef-transportadora',label:'Transportadora'},
    {id:'ef-motorista',label:'Motorista'},
    {id:'ef-placa',label:'Placa do Caminhão'},
    {id:'ef-tipo-caminhao',label:'Tipo de Caminhão'},
    {id:'ef-nf',label:'NF'},
    {id:'ef-peso',label:'Peso'},
    {id:'ef-volumes',label:'Volumes'},
  ])) return;
  const numero = document.getElementById('ef-numero').value.trim();
  const cliente = document.getElementById('ef-cliente').value.trim();
  const destino = document.getElementById('ef-destino').value.trim();
  const data = document.getElementById('ef-data').value;

  const id = 'emb-'+STATE.nextEmbId;
  STATE.nextEmbId++;
  const emb = {
    id, numero, cliente, destino, data,
    unidade: document.getElementById('ef-unidade').value,
    status: document.getElementById('ef-status').value,
    transportadora: document.getElementById('ef-transportadora').value,
    motorista: document.getElementById('ef-motorista').value,

    produto: document.getElementById('ef-produto').value,
    especificacao: document.getElementById('ef-especificacao').value,
    local_embarque: document.getElementById('ef-local').value,
    nf: document.getElementById('ef-nf').value,
    peso: document.getElementById('ef-peso').value,
    volumes: document.getElementById('ef-volumes').value,
    observacoes: document.getElementById('ef-obs').value,
    historico:[{data,hora:fmtDateTime(),usuario:STATE.user.name,msg:'Embarque criado'}]
  };

function saveEditarEmbarque(id){
  if(!validateFields([
    {id:'ef-numero',label:'Número do Pedido'},
    {id:'ef-data',label:'Data'},
    {id:'ef-unidade',label:'Unidade'},
    {id:'ef-cliente',label:'Cliente'},

    {id:'ef-produto',label:'Produto'},
    {id:'ef-transportadora',label:'Transportadora'},
    {id:'ef-motorista',label:'Motorista'},
    {id:'ef-placa',label:'Placa do Caminhão'},
    {id:'ef-tipo-caminhao',label:'Tipo de Caminhão'},
    {id:'ef-nf',label:'NF'},
    {id:'ef-peso',label:'Peso'},
    {id:'ef-volumes',label:'Volumes'},
  ])) return;
  const e = STATE.embarques.find(x=>x.id===id);
  if(!e) return;
  const oldStatus = e.status;
  e.numero = document.getElementById('ef-numero').value;

  e.tipo_caminhao = document.getElementById('ef-tipo-caminhao').value;
  e.horario = document.getElementById('ef-horario').value;
  e.nf = document.getElementById('ef-nf').value;
  e.peso = document.getElementById('ef-peso').value;
  e.volumes = document.getElementById('ef-volumes').value;
  e.status = document.getElementById('ef-status').value;
  e.observacoes = document.getElementById('ef-obs').value;
  if(e.status!==oldStatus){
    e.historico.push({data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,
      msg:`Status alterado: ${STATUS_EMB[oldStatus]?.label} → ${STATUS_EMB[e.status]?.label}`});

function confirmarExcluirEmb(id){
  if(!canDo('delete')){ toast('🔒 Sem permissão para excluir','red'); return; }
  const e = STATE.embarques.find(x=>x.id===id);
  if(!e) return;
  openModal('🗑️ Excluir Embarque',
    `<div style="text-align:center;padding:10px 0 16px">
      <div style="font-size:36px;margin-bottom:8px">⚠️</div>
      <div style="font-size:15px;font-weight:700">Excluir <b>${e.numero}</b>?</div>
      <div style="color:var(--mut);font-size:13px;margin-top:6px">${e.cliente} → ${e.destino}<br>Esta ação não pode ser desfeita.</div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-red" onclick="excluirEmbarque('${id}')">🗑️ Confirmar Exclusão</button>`);
}

function excluirEmbarque(id){
  if(!canDo('delete')){ toast('🔒 Sem permissão para excluir','red'); return; }
  STATE.embarques = STATE.embarques.filter(e=>e.id!==id);
  Object.values(STATE.programacao).forEach(p=>{
    p.embarques_ids=(p.embarques_ids||[]).filter(x=>x!==id);
  });
  saveState();
  closeModal();
  navigate('embarques');
  toast('🗑️ Embarque excluído','');
}

function openAtualizarStatusEmb(id){
  const e = STATE.embarques.find(x=>x.id===id);
  if(!e) return;
  openModal(`🔄 Status — ${e.numero}`,`
    <p style="font-size:13px;color:var(--mut);margin-bottom:12px">Status atual: ${badge(STATUS_EMB,e.status)}</p>
    <div class="status-grid" id="embStatusGrid">
      ${Object.entries(STATUS_EMB).map(([k,v])=>`
      <div class="status-opt ${e.status===k?'selected':''}" onclick="selectEmbStatus('${k}')" id="es-${k}" style="border-color:${e.status===k?v.color:''};background:${e.status===k?v.bg:''}">
        <div style="font-size:18px">${v.ico}</div>

      </div>`).join('')}

    </div>
    <input type="hidden" id="embStatusVal" value="${e.status}">`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-pri" onclick="saveStatusEmb('${id}')">✅ Confirmar</button>`
  );

function selectEmbStatus(k){
  document.querySelectorAll('[id^="es-"]').forEach(el=>{el.classList.remove('selected');el.style.borderColor='';el.style.background=''});
  const v=STATUS_EMB[k];
  const el=document.getElementById('es-'+k);
  el.classList.add('selected');
  el.style.borderColor=v.color;
  el.style.background=v.bg;
  document.getElementById('embStatusVal').value=k;
}

function saveStatusEmb(id){
  const e=STATE.embarques.find(x=>x.id===id);
  if(!e) return;
  const newStatus=document.getElementById('embStatusVal').value;
  const obs=document.getElementById('embStatusObs').value;
  const oldStatus=e.status;
  if(newStatus===oldStatus&&!obs){closeModal();return}
  e.status=newStatus;
  if(obs||newStatus!==oldStatus){
    e.historico.push({data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,
      msg:`Status: ${STATUS_EMB[oldStatus]?.label} → ${STATUS_EMB[newStatus]?.label}${obs?' — '+obs:''}`});
  }
  if(obs) e.observacoes=obs;
  saveState();
  closeModal();
  navigate(STATE.currentPage);
  toast(`✅ Embarque ${e.numero}: ${STATUS_EMB[newStatus].label}`,'grn');
}

function liberarEmbarque(id){
  const e=STATE.embarques.find(x=>x.id===id);
  if(!e) return;
  e.status='em_rota';
  e.historico.push({data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,msg:'Bloqueio removido — Embarque liberado para rota'});
  e.observacoes='';
  saveState();
  closeModal();
  navigate(STATE.currentPage);
  toast('✅ Embarque '+e.numero+' liberado!','grn');
}

function renderPedidos(){
  const peds = (STATE.pedidos||[]);
  const filtered = _pedFilterStatus==='todos' ? peds : peds.filter(p=>p.status===_pedFilterStatus);
  const counts = {novo:0,em_producao:0,pronto:0,expedido:0,cancelado:0};
  peds.forEach(p=>{ if(counts[p.status]!==undefined) counts[p.status]++; });
  const today = todayStr();
  const atrasados = peds.filter(p=>p.prazo<today && p.status!=='expedido' && p.status!=='cancelado').length;

  return `
  <div class="page-hdr">
    <h1>📦 Pedidos — Produção & Expedição</h1>
    <p>Controle de pedidos da entrada até a expedição. <a href="../producao/index.html" target="_blank" style="color:var(--sec);font-weight:700">🏭 Abrir Sistema de Produção ↗</a></p>
  </div>
  ${atrasados>0?`<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:11px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
    <span style="font-size:18px">⚠️</span>
    <div><b style="color:var(--red)">${atrasados} pedido(s) com prazo vencido</b> — ainda não expedidos. <button class="btn btn-ghost btn-sm" onclick="_pedFilterStatus='em_producao';renderPage('pedidos')">Ver em produção</button></div>
  </div>`:''}
  <div class="stat-grid">
    <div class="stat-card sc-blue" style="cursor:pointer" onclick="_pedFilterStatus='todos';renderPage('pedidos')">
      <div class="stat-ico">📦</div><div><div class="stat-num">${peds.length}</div><div class="stat-lbl">Total de Pedidos</div></div>
    </div>
    <div class="stat-card sc-ylw" style="cursor:pointer" onclick="_pedFilterStatus='em_producao';renderPage('pedidos')">
      <div class="stat-ico">⚙️</div><div><div class="stat-num">${counts.em_producao}</div><div class="stat-lbl">Em Produção</div></div>

function highlightDestino(){
  const hints = {
    producao: 'O pedido vai apenas para a fila de produção, sem gerar embarque ou coleta.',
    embarque: 'Um embarque será criado automaticamente na programação da semana para o prazo do pedido.',
    coleta:   'Uma coleta será criada automaticamente na programação da semana para o prazo do pedido.',
  };
  const labels = {producao:'lbl-dest-producao', embarque:'lbl-dest-embarque', coleta:'lbl-dest-coleta'};
  const sel = document.querySelector('input[name="pf-destino"]:checked')?.value||'producao';
  Object.entries(labels).forEach(([v,lid])=>{
    const el = document.getElementById(lid);
    if(!el) return;
    if(v===sel){
      el.style.border='2px solid var(--sec)';
      el.style.background='#EFF6FF';
      el.style.color='var(--pri)';
    } else {
      el.style.border='2px solid var(--bdr)';
      el.style.background='';
      el.style.color='';
    }
  });
  const hint = document.getElementById('pf-destino-hint');
  if(hint) hint.textContent = hints[sel]||'';
}

function salvarPedido(id){
  if(!validateFields([
    {id:'pf-numero',label:'Número'},
    {id:'pf-cliente',label:'Cliente'},
    {id:'pf-unidade',label:'Unidade'},
    {id:'pf-produto',label:'Produto'},
    {id:'pf-quantidade',label:'Quantidade'},
    {id:'pf-prazo',label:'Prazo'},
  ])) return;
  const numero   = document.getElementById('pf-numero').value;
  const status   = document.getElementById('pf-status').value;
  const destino  = document.querySelector('input[name="pf-destino"]:checked')?.value||'producao';
  const prazo    = document.getElementById('pf-prazo').value;
  const cliente  = document.getElementById('pf-cliente').value;
  const unidade  = document.getElementById('pf-unidade').value;
  const produto  = document.getElementById('pf-produto').value;
  const quantidade = document.getElementById('pf-quantidade').value;
  const prioridade = document.getElementById('pf-prioridade').value;
  const obs      = document.getElementById('pf-obs').value;

  if(id){
    const p = STATE.pedidos.find(x=>x.id===id);
    if(!p) return;
    const oldStatus = p.status;
    p.numero=numero; p.cliente=cliente; p.unidade=unidade;
    p.produto=produto; p.quantidade=quantidade;
    p.prazo=prazo; p.prioridade=prioridade; p.observacoes=obs;
    p.status=status; p.tipo_destino=destino;
    if(oldStatus!==status) p.historico.push({data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,
      msg:`Status: ${STATUS_PED[oldStatus]?.label} → ${STATUS_PED[status].label}`});
  } else {
    const newId='ped-'+(STATE.nextPedId||310);
    STATE.nextPedId=(STATE.nextPedId||310)+1;
    STATE.pedidos = STATE.pedidos||[];
    const histMsg = destino==='embarque'
      ? 'Pedido criado → Embarque gerado automaticamente na programação'
      : destino==='coleta'
      ? 'Pedido criado → Coleta gerada automaticamente na programação'
      : 'Pedido criado e enviado à produção';
    STATE.pedidos.push({
      id:newId, numero, cliente, produto, quantidade, unidade,
      prioridade, prazo, observacoes:obs, tipo_destino:destino,
      status:status||'novo', data_criacao:todayStr(),
      historico:[{data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,msg:histMsg}],
    });

    // Auto-gerar embarque na programação
    if(destino==='embarque'){
      const embNum = STATE.nextEmbId||100;
      STATE.nextEmbId = embNum+1;
      const embId = 'emb-'+embNum;
      STATE.embarques = STATE.embarques||[];
      STATE.embarques.push({
        id:embId, numero:'#'+embNum, cliente, destino:'', unidade,
        status:'separando', placa:'', tipo_caminhao:'', motorista:'',
        data:prazo, horario:'', transportadora:'', produto, especificacao:'',
        peso:'', volumes:1, nf:'', observacoes:`Gerado automaticamente do Pedido ${numero}`,
        pedido_origem:newId,
        historico:[{data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,
          msg:`Embarque criado automaticamente a partir do Pedido ${numero}`}],
      });
      if(!STATE.programacao[prazo]) STATE.programacao[prazo]={embarques_ids:[],coletas_ids:[]};
      STATE.programacao[prazo].embarques_ids.push(embId);
      toast('🚚 Embarque #'+embNum+' criado na programação de '+fmtDate(prazo),'grn');
    }

    // Auto-gerar coleta na programação
    if(destino==='coleta'){
      const colNum = STATE.nextColId||100;
      STATE.nextColId = colNum+1;
      const colId = 'col-'+colNum;
      STATE.coletas = STATE.coletas||[];
      STATE.coletas.push({
        id:colId, numero:'#'+colNum, fornecedor:cliente, origem:'', unidade,
        status:'aguardando', placa:'', tipo_caminhao:'', motorista:'',
        data:prazo, horario_previsto:'', produto, peso:'', volumes:1,
        observacoes:`Gerado automaticamente do Pedido ${numero}`,
        pedido_origem:newId,
        historico:[{data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,
          msg:`Coleta criada automaticamente a partir do Pedido ${numero}`}],
      });
      if(!STATE.programacao[prazo]) STATE.programacao[prazo]={embarques_ids:[],coletas_ids:[]};
      STATE.programacao[prazo].coletas_ids.push(colId);
      toast('📦 Coleta #'+colNum+' criada na programação de '+fmtDate(prazo),'grn');
    }
  }
  saveState();
  closeModal();
  navigate(destino==='embarque'?'embarques':destino==='coleta'?'coletas':'pedidos');
  toast('✅ Pedido salvo com sucesso','grn');
}

function atualizarStatusPedido(id, novoStatus){
  const p = (STATE.pedidos||[]).find(x=>x.id===id);
  if(!p) return;
  const old = p.status;
  p.status = novoStatus;
  p.historico.push({data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,
    msg:`Status: ${STATUS_PED[old]?.label} → ${STATUS_PED[novoStatus].label}`});
  // Auto-estoque: quando pedido fica pronto, registra entrada no estoque
  if(novoStatus==='pronto'){
    const item = encontrarItemEstoque(p.produto);
    if(item){
      const qty = parseInt((p.quantidade||'').replace(/\D/g,''))||1;
      registrarMovEstoque(item.id,'entrada',qty,'producao',
        `Produção concluída — Pedido ${p.numero}`, STATE.user.name, p.id);
      toast(`📦 Estoque atualizado: +${qty} ${item.unidade_medida} de ${item.nome}`,'grn');
    }
  }
  saveState();
  closeModal();
  navigate('pedidos');
  toast(`✅ Pedido ${p.numero}: ${STATUS_PED[novoStatus].label}`,'grn');
}

    historico:[{data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,msg:'Embarque criado a partir do pedido '+pedidoId}],
  };
  STATE.embarques.push(emb);
  if(!STATE.programacao[data]) STATE.programacao[data]={embarques_ids:[],coletas_ids:[]};
  STATE.programacao[data].embarques_ids.push(newId);
  // Mark pedido as expedido
  const p = (STATE.pedidos||[]).find(x=>x.id===pedidoId);
  if(p){
    p.status='expedido';
    p.historico.push({data:todayStr(),hora:fmtDateTime(),usuario:STATE.user.name,msg:'Expedido — Embarque '+newId+' gerado'});
    // Auto-estoque: saída ao embarcar
    const itemEmb = encontrarItemEstoque(p.produto);
    if(itemEmb){
      const qtyEmb = parseInt((p.quantidade||'').replace(/\D/g,''))||1;
      registrarMovEstoque(itemEmb.id,'saida',qtyEmb,'embarque',
        `Embarque ${newId} — Pedido ${p.numero}`, STATE.user.name, newId);
    }
  }
  saveState();
  closeModal();
  navigate('embarques');
  toast('✅ Embarque '+newId+' criado com sucesso!','grn');
}

function gerarMensagemWhatsApp(alertas){
  const hoje = (new Date()).toLocaleDateString('pt-BR');
  const criticos = alertas.filter(a=>a.tipo==='critico');
  const avisos = alertas.filter(a=>a.tipo==='aviso');
  let msg = `⚡ *ACELERA TIME — Relatório Diário*\n📅 ${hoje}\n\n`;
  if(criticos.length>0){
    msg += `🚨 *ALERTAS CRÍTICOS (${criticos.length})*\n`;
    criticos.forEach(a=>{
      msg += `• ${a.titulo}\n`;
      a.itens.slice(0,3).forEach(it=>{ msg += `  ◦ ${it}\n`; });
    });
    msg += '\n';
  }
  if(avisos.length>0){
    msg += `⚠️ *AVISOS (${avisos.length})*\n`;
    avisos.forEach(a=>{
      msg += `• ${a.titulo}\n`;
      a.itens.slice(0,2).forEach(it=>{ msg += `  ◦ ${it}\n`; });
    });
    msg += '\n';
  }
  const resumo = alertas.find(a=>a.id==='apollo-1');
  if(resumo){ msg += `ℹ️ *RESUMO*\n${resumo.descricao}\n\n`; }
  msg += `_Enviado automaticamente pelo Agente IA ACELERA TIME_`;
  return msg;
}

   MÓDULO ROTEIRIZAÇÃO IA
   ============================================================ */
// Mapa de regiões — distâncias aproximadas em km a partir de João Pessoa (base)
const REGIOES_DISTANCIA = {
  'SP':2330,'RJ':2200,'MG':1900,'PR':2600,'RS':3100,'SC':2800,
  'BA':900,'PE':130,'CE':600,'RN':180,'PB':0,'MA':1100,'GO':1800,'DF':1900,
};

function extrairUF(destino){
  const m = (destino||'').match(/–\s*([A-Z]{2})$/);
  return m?m[1]:null;
}
function extrairCidade(destino){
  const m = (destino||'').match(/^([^–]+)/);
  return m?m[1].trim():destino;
}

function renderRoteirizacao(){
  const today = todayStr();
  const embsAtivos = getFilteredEmbarques().filter(e=>
    ['separando','em_embarque','em_rota'].includes(e.status)
  );

  // Group by date
  const datas = [...new Set(embsAtivos.map(e=>e.data))].sort();
  const dataFiltro = datas[0]||today;
  const embsDia = embsAtivos.filter(e=>e.data===dataFiltro);

  // Group by region
  const porRegiao = {};
  embsDia.forEach(e=>{
    const uf = extrairUF(e.destino)||'Outros';
    if(!porRegiao[uf]) porRegiao[uf]=[];
    porRegiao[uf].push(e);
  });

  // Sort regions by distance
  const regioesSorted = Object.keys(porRegiao).sort((a,b)=>{
    const da = REGIOES_DISTANCIA[a]||9999;
    const db = REGIOES_DISTANCIA[b]||9999;
    return da-db;
  });

  // Generate route suggestion
  function gerarSugestao(embsDia){
    if(embsDia.length===0) return null;
    const urgentes = embsDia.filter(e=>e.status==='separando'&&e.horario);
    const cidades = [...new Set(embsDia.map(e=>extrairCidade(e.destino)))];
    const ufs = [...new Set(embsDia.map(e=>extrairUF(e.destino)).filter(Boolean))];
    const porUF = {};
    ufs.forEach(uf=>{ porUF[uf]=(porRegiao[uf]||[]).length; });
    const maiorGrupo = ufs.sort((a,b)=>(porUF[b]||0)-(porUF[a]||0))[0];

    let sugestao = `🤖 *Análise IA — Roteirização para ${fmtDate(dataFiltro)}*\n\n`;

      sugestao += `\n⏰ *Prioridade por horário:*\n`;
      urgentes.sort((a,b)=>a.horario.localeCompare(b.horario)).forEach(e=>{
        sugestao += `  • ${e.horario} — ${e.numero} → ${e.destino} (${e.motorista||'—'})\n`;
      });
    }

    sugestao += `\n🗺️ *Sugestão de Agrupamento por Rota:*\n`;
    regioesSorted.forEach((uf,i)=>{
      const embs = porRegiao[uf];
      const dist = REGIOES_DISTANCIA[uf];
      sugestao += `\n${i+1}. ${uf}${dist?` (~${dist.toLocaleString('pt-BR')} km)`:''} — ${embs.length} carga(s)\n`;
      embs.forEach(e=>{
        sugestao += `   ├ ${e.numero} — ${e.cliente} → ${extrairCidade(e.destino)}\n`;
        sugestao += `   │  🚛 ${e.placa||'—'} | 👤 ${e.motorista||'—'} | ${e.horario||'—'}\n`;
      });
    });

    sugestao += `\n💡 *Recomendação:*\n`;
    if(ufs.length>1){
      sugestao += `Concentre as cargas do estado de ${maiorGrupo} no mesmo caminhão para otimizar frete.`;
      if(regioesSorted.length>1) sugestao += ` Priorize a saída para ${regioesSorted[0]} (mais próximo) pela manhã e ${regioesSorted[regioesSorted.length-1]} (mais distante) com saída antecipada.`;

      sugestao += `Todas as cargas são para ${ufs[0]}. Organize a rota visitando as cidades na sequência: ${cidades.join(' → ')}.`;
    } else {
      sugestao += `Cargas concentradas para ${embsDia[0]?.destino||'—'}. Maximizar volume por viagem.`;
    }
    return sugestao;
  }

  const sugestao = embsDia.length>0 ? gerarSugestao(embsDia) : null;
  const cfg = STATE.iaConfig||{};
  const num = (cfg.whatsappNumber||'').replace(/\D/g,'');

              ${embs.map(e=>`

function validateFields(fields){
  let valid=true;
  fields.forEach(({id,label})=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.classList.remove('field-error');
    const prev=el.parentElement.querySelector('.field-error-msg');
    if(prev) prev.remove();
    const val=(el.value||'').trim();
    if(!val||val===''){
      el.classList.add('field-error');
      const msg=document.createElement('div');
      msg.className='field-error-msg';
      msg.innerHTML='⚠ '+label+' é obrigatório';
      el.parentElement.appendChild(msg);
      if(valid){
        // scroll to first error
        setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),50);
      }
      valid=false;
    }
  });
  if(!valid) toast('⚠️ Preencha todos os campos obrigatórios','ylw');
  return valid;
}

/* ============================================================
   MÓDULO ESTOQUE
   ============================================================ */
const CAT_ESTOQUE = ['Produto Acabado','Matéria Prima','Embalagem','Insumo','Equipamento','Outro'];
const UM_ESTOQUE  = ['un','kg','L','rolo','caixa','cx','pallet','saco','m²','m'];

let _estFiltroCategoria = 'todas';
let _estFiltroStatus    = 'todos';
let _estSearch          = '';

function getEstStatusLabel(item){
  if(item.quantidade_atual<=0) return {label:'Sem Estoque',  color:'#B91C1C', bg:'#FEE2E2'};
  if(item.quantidade_atual<=item.qtd_min) return {label:'Estoque Baixo', color:'#B45309', bg:'#FEF3C7'};
  if(item.qtd_max && item.quantidade_atual>=item.qtd_max) return {label:'Estoque Cheio', color:'#0284C7', bg:'#E0F2FE'};
  return {label:'Normal', color:'#059669', bg:'#D1FAE5'};
}

function registrarMovEstoque(itemId, tipo, quantidade, origem, obs, usuario, refId){
  const est = (STATE.estoque||[]).find(e=>e.id===itemId);
  if(!est) return;
  const qty = Number(quantidade)||0;
  if(qty<=0) return;
  if(!est.movimentacoes) est.movimentacoes=[];
  est.movimentacoes.push({
    id:'mov-'+Date.now(), tipo, quantidade:qty, origem:origem||'manual',
    obs:obs||'', ref_id:refId||'', data:todayStr(), hora:fmtDateTime(),
    usuario: usuario||(STATE.user?STATE.user.name:'Sistema'),
  });
  if(tipo==='entrada') est.quantidade_atual=(est.quantidade_atual||0)+qty;
  else if(tipo==='saida') est.quantidade_atual=Math.max(0,(est.quantidade_atual||0)-qty);
  else if(tipo==='ajuste') est.quantidade_atual=qty;
  saveState();
}

function encontrarItemEstoque(nomeProduto){
  if(!nomeProduto) return null;
  const nome = nomeProduto.toLowerCase();
  return (STATE.estoque||[]).find(i=>i.nome.toLowerCase()===nome || nome.includes(i.nome.toLowerCase()) || i.nome.toLowerCase().includes(nome));
}

function salvarItemEstoque(id){
  const nome = (document.getElementById('ef-nome')?.value||'').trim();
  if(!nome){ toast('⚠️ Nome é obrigatório','ylw'); return; }
  if(!STATE.estoque) STATE.estoque=[];
  if(id){
    const item = STATE.estoque.find(x=>x.id===id);
    if(!item) return;
    item.nome=nome;
    item.categoria=document.getElementById('ef-cat')?.value||'Outro';
    item.unidade_medida=document.getElementById('ef-um')?.value||'un';
    item.unidade_empresa=document.getElementById('ef-unid')?.value||'';
    item.custo_unitario=parseFloat(document.getElementById('ef-custo')?.value||0);
    item.qtd_min=parseInt(document.getElementById('ef-qmin')?.value||0);
    item.qtd_max=parseInt(document.getElementById('ef-qmax')?.value||0);
    toast('✅ Item atualizado!','grn');
  } else {
    const qtdIni = parseInt(document.getElementById('ef-qini')?.value||0);
    const newId='est-'+(STATE.nextEstId||20);
    STATE.nextEstId=(STATE.nextEstId||20)+1;
    const item = {
      id:newId, nome,
      categoria:document.getElementById('ef-cat')?.value||'Outro',
      unidade_medida:document.getElementById('ef-um')?.value||'un',
      unidade_empresa:document.getElementById('ef-unid')?.value||'',
      custo_unitario:parseFloat(document.getElementById('ef-custo')?.value||0),
      qtd_min:parseInt(document.getElementById('ef-qmin')?.value||0),
      qtd_max:parseInt(document.getElementById('ef-qmax')?.value||0)||0,
      quantidade_atual:0, movimentacoes:[],
    };
    STATE.estoque.push(item);
    if(qtdIni>0) registrarMovEstoque(newId,'entrada',qtdIni,'manual','Estoque inicial');
    toast('✅ Item de estoque criado!','grn');
  }
  saveState();
  closeModal();
  navigate('estoque');
}

function openDetalheEstoque(id){

function salvarUsuario(id){
  const nome  = (document.getElementById('uf-nome')?.value||'').trim();
  const email = (document.getElementById('uf-email')?.value||'').trim().toLowerCase();
  const role  = document.getElementById('uf-role')?.value||'operador';
  const setor = document.getElementById('uf-setor')?.value||'';
  const senha = document.getElementById('uf-senha')?.value||'';
  const ativo = document.getElementById('uf-ativo')?.value==='true';
  if(!nome||!email){ toast('⚠️ Nome e e-mail são obrigatórios','ylw'); return; }
  if(!STATE.users) STATE.users=[];
  if(id){
    const u = STATE.users.find(x=>x.id===id);
    if(!u) return;
    // Prevent removing admin from last admin
    if(u.roleKey==='admin' && role!=='admin'){
      const adminCount = STATE.users.filter(x=>x.roleKey==='admin'&&x.ativo!==false&&x.id!==id).length;
      if(adminCount===0){ toast('⚠️ Deve existir pelo menos um Administrador ativo','ylw'); return; }
    }
    u.name=nome; u.email=email; u.roleKey=role; u.setor=setor; u.ativo=ativo;
    if(senha) u.senha=senha;
    // If editing self, update STATE.user too
    if(STATE.user && STATE.user.id===id){
      STATE.user.name=nome; STATE.user.email=email;
      STATE.user.roleKey=role; STATE.user.role=ROLES[role]?.label||role; STATE.user.setor=setor;
    }
    toast('✅ Usuário atualizado!','grn');
  } else {
    // Check unique email
    if(STATE.users.some(x=>x.email.toLowerCase()===email)){ toast('❌ E-mail já cadastrado','red'); return; }
    const newId='u-'+Date.now();
    STATE.users.push({id:newId,name:nome,email,roleKey:role,setor,senha:senha||'123456',ativo:true});
    toast('✅ Usuário criado com sucesso!','grn');
  }
  saveState();
  closeModal();
  navigate('usuarios');
}

function confirmarExcluirUsuario(id){
  const u = (STATE.users||[]).find(x=>x.id===id);
  if(!u) return;
  if(STATE.user && STATE.user.id===id){ toast('⚠️ Você não pode excluir sua própria conta','ylw'); return; }
  const adminCount = STATE.users.filter(x=>x.roleKey==='admin'&&x.ativo!==false).length;
  if(u.roleKey==='admin'&&adminCount<=1){ toast('⚠️ Deve existir pelo menos um Administrador','ylw'); return; }
  openModal('🗑️ Excluir Usuário',
    `<div style="text-align:center;padding:10px 0 16px">
      <div style="font-size:40px;margin-bottom:10px">⚠️</div>
      <div style="font-size:16px;font-weight:700;color:var(--txt);margin-bottom:6px">Excluir <b>${u.name}</b>?</div>
      <div style="font-size:13px;color:var(--mut)">Esta ação não pode ser desfeita.<br>O usuário perderá o acesso ao sistema.</div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-red" onclick="excluirUsuario('${id}')">🗑️ Confirmar Exclusão</button>`);
}

}

    {id:'u1',name:'Roberto Lima', email:'roberto@aceleratime.com',roleKey:'supervisor',setor:'Logística',senha:'123456',ativo:true},
    {id:'u2',name:'Carlos Silva', email:'carlos@aceleratime.com', roleKey:'gerente',   setor:'Geral',    senha:'123456',ativo:true},
    {id:'u3',name:'Admin Sistema',email:'admin@aceleratime.com',  roleKey:'admin',     setor:'TI',       senha:'admin', ativo:true},
  ];
  // Patch existing logged-in user with roleKey if missing
  if(STATE.user && !STATE.user.roleKey){
    const found = (STATE.users||[]).find(x=>x.email===STATE.user.email);
    if(found) STATE.user.roleKey=found.roleKey;
    else STATE.user.roleKey='supervisor'; // default
  }
  // Auto-run agents on load
  if(STATE.user) runAgentes();
  if(STATE.user){
    renderApp();
    navigate(STATE.currentPage||'dashboard');
  } else {
    renderLogin();
  }
}
